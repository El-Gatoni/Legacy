name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools" 2>&1 | grep -v "^\[=" || true

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      # ── Debug build (pull requests) ────────────────────────────────────────
      - name: Build debug APK
        if: github.event_name == 'pull_request'
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload debug APK artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: legacy-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # ── Release build (version tags) ───────────────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/')
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon

      - name: Rename APK with version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
             "Legacy-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Legacy ${{ github.ref_name }}"
          files: "Legacy-${{ github.ref_name }}.apk"
          generate_release_notes: true
